bind = SUPER, A, exec, kitty
bind = SUPER, Z, exec, kitty yazi
bind = SUPER, E, killactive,
bind = SUPER, R, exec, rofi -show drun
bind = SUPER, F, togglefloating
bind = SUPER, F, resizeactive, exact 1500 900
bind = SUPER, F, centerwindow
bind = SUPER SHIFT, F, fullscreen
bind = SUPER, TAB, exec, bash ~/.config/hypr/scripts/toggle-layout.sh
bind = SUPER, L, exec, bash ~/.config/rofi/power-menu/power-menu.sh
bind = SUPER, SPACE, exec, bash ~/.config/waybar/modules-scripts/toggle-waybar.sh
bind = SUPER, ESCAPE, setprop, active opaque toggle

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

bind = SUPER SHIFT, C, exec, cliphist wipe
bind = SUPER, C, exec, ~/.config/rofi/clipboard-menu/clipboard-menu.sh delete
bind = SUPER, V, exec, ~/.config/rofi/clipboard-menu/clipboard-menu.sh paste

bind = SUPER, P, exec, bash -c 'grim - | tee >(wl-copy) > ~/Images/Screenshots/screenshot_$(date +%s).png'
bind = SUPER CTRL, P, exec, bash -c 'coords=$(slurp) && sleep 0.1 && grim -g "$coords" - | tee >(wl-copy) > ~/Images/Screenshots/screenshot_$(date +%s).png'

bind = SUPER, bracketleft, exec, ~/.config/hypr/scripts/brightness-control.sh down
bind = SUPER, bracketright, exec, ~/.config/hypr/scripts/brightness-control.sh up
bindel = ,XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness-control.sh up
bindel = ,XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness-control.sh down

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

bind = SUPER, Q, layoutmsg, orientationleft
bind = SUPER, D, layoutmsg, orientationright
bind = SUPER, S, layoutmsg, swapwithmaster

bind = SUPER, EQUAL, exec, ~/.config/hypr/scripts/volume-control.sh up
bind = SUPER, MINUS, exec, ~/.config/hypr/scripts/volume-control.sh down
bindel = ,XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume-control.sh up
bindel = ,XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume-control.sh down
